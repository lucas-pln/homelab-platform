# Automated AlmaLinux 9 installation for a reusable Proxmox/Packer base image.

text
cdrom
skipx
eula --agreed
firstboot --disable

lang en_US.UTF-8
keyboard --vckeymap=us
timezone Europe/Paris --utc

network --bootproto=dhcp --device=link --activate --onboot=on

user --name=packer --groups=wheel --shell=/bin/bash
sshkey --username=packer "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIF0u2o36AyYINgi3FMfvxITtoa8r5ERyGApCOxjVDq5j packer-build-pubkey"

rootpw --lock
selinux --enforcing
firewall --enabled --service=ssh

# Enable the baseline services expected from the template image.
services --enabled=sshd,chronyd,firewalld,NetworkManager

ignoredisk --only-use=sda
zerombr
clearpart --all --initlabel --disklabel=gpt --drives=sda

# Keep the image neutral; Terraform attaches additional data disks and Ansible configures them.
part /boot/efi --fstype=efi --size=512 --ondisk=sda
part /boot --fstype=xfs --size=1024 --ondisk=sda
part pv.01 --grow --size=1 --ondisk=sda

volgroup vg_system --pesize=4096 pv.01
logvol / --fstype=xfs --name=root --vgname=vg_system --grow --size=16000
logvol swap --fstype=swap --name=swap --vgname=vg_system --size=2048

bootloader --boot-drive=sda

reboot

%packages
# OS Baseline only; Packer owns specific packages: scripts/00-install-template-packages.sh
@^minimal-environment
%end

# Minimal security of the base image
%post
cat > /etc/ssh/sshd_config.d/disable-root-login.conf <<'EOF'
PermitRootLogin no
PasswordAuthentication no
PubkeyAuthentication yes
EOF

# Packer temporary sudo access
cat > /etc/sudoers.d/packer <<'EOF'
packer ALL=(ALL) NOPASSWD:ALL
EOF
chmod 0440 /etc/sudoers.d/packer
%end
