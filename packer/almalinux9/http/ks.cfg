# Basic Kickstart configuration for MVP Packer image

text
cdrom
skipx
eula --agreed
firstboot --disable

lang en_US.UTF-8
keyboard --xlayouts='us'
timezone Europe/Paris --utc

network --bootproto=static --ip=10.10.10.101 --netmask=255.255.255.0 --device=ens18 --activate --onboot=yes --hostname=almalinux9-template

rootpw --plaintext packer
user --name=packer --password=packer --plaintext --groups=wheel

authselect --useshadow --passalgo=sha512
selinux --enforcing
firewall --enabled --service=ssh

services --enabled=sshd,chronyd

zerombr
clearpart --all --initlabel
autopart --type=lvm

bootloader --location=mbr --append="crashkernel=auto"

reboot

%packages
@^minimal-environment
openssh-server
sudo
chrony
curl
%end

%post --log=/root/ks-post.log

echo "packer ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/packer
chmod 0440 /etc/sudoers.d/packer

systemctl enable sshd
systemctl enable chronyd

# Lab-only. Do not keep this in a real production image.
sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config

%end