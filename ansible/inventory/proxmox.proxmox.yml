---
plugin: community.proxmox.proxmox

url: "{{ lookup('env', 'ANSIBLE_PROXMOX_URL') }}"
user: "{{ lookup('env', 'ANSIBLE_PROXMOX_USER') }}"
token_id: "{{ lookup('env', 'ANSIBLE_PROXMOX_TOKEN_ID') }}"
token_secret: "{{ lookup('env', 'ANSIBLE_PROXMOX_TOKEN_SECRET') }}"

exclude_nodes: true

filters:
  - proxmox_vmtype == "qemu"
  - proxmox_status == "running"
  - "'managed_by_terraform' in (proxmox_tags | default('')).split(';')"
  - "'os_almalinux9' in (proxmox_tags | default('')).split(';')"
  - "'env_lab' in (proxmox_tags | default('')).split(';')"

groups:
    terraform_managed: "'managed_by_terraform' in (proxmox_tags | default('')).split(';')"
    almalinux9: "'os_almalinux9' in (proxmox_tags | default('')).split(';')"
    lab: "'env_lab' in (proxmox_tags | default('')).split(';')"