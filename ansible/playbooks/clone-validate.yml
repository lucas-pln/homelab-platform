---
- name: Validate newly provisioned clones before baseline configuration
  hosts: terraform_managed
  gather_facts: true

  vars:
    clone_validation_report_dir: "{{ playbook_dir }}/../artifacts/clone-validate"

  tasks:
    - name: Read machine-id
      ansible.builtin.command: cat /etc/machine-id
      register: machine_id
      changed_when: false

    - name: Check cloud-init completed successfully
      ansible.builtin.command: cloud-init status
      register: cloud_init_status
      changed_when: false
      failed_when: false

    - name: Resolve host FQDN
      ansible.builtin.command: getent ahostsv4 {{ ansible_fqdn }}
      register: fqdn_resolution
      changed_when: false
      failed_when: false

    - name: Assert machine identity is valid for a booted clone
      ansible.builtin.assert:
        that:
          - machine_id.stdout is match("^[0-9a-f]{32}$")
        success_msg: "machine identity was regenerated on first boot"
        fail_msg: "machine identity does not look valid for a cloned VM"

    - name: Assert cloud-init completed first-boot configuration
      ansible.builtin.assert:
        that:
          - cloud_init_status.rc == 0
          - cloud_init_status.stdout is search("status: done")
        success_msg: "cloud-init completed first-boot configuration"
        fail_msg: "cloud-init did not complete first-boot configuration"

    - name: Assert hostname and DNS are valid
      ansible.builtin.assert:
        that:
          - (ansible_hostname | length) > 0
          - ansible_hostname == inventory_hostname
          - (ansible_fqdn | length) > (ansible_hostname | length)
          - ansible_fqdn is match("^" ~ ansible_hostname ~ "\\.")
          - fqdn_resolution.stdout | length > 0
          - ansible_default_ipv4.address is defined
          - fqdn_resolution.stdout is search(ansible_default_ipv4.address)
        success_msg: "hostname, FQDN, and IPv4 name resolution are valid"
        fail_msg: "hostname, FQDN, or IPv4 name resolution is invalid"

    - name: Ensure local artifacts directory exists
      ansible.builtin.file:
        path: "{{ clone_validation_report_dir }}"
        state: directory
        mode: "0755"
      delegate_to: localhost

    - name: Write local clone validation report
      ansible.builtin.copy:
        dest: "{{ clone_validation_report_dir }}/{{ inventory_hostname }}.md"
        mode: "0644"
        content: |
          # Clone validation report

          | Field | Value |
          | --- | --- |
          | Host | {{ inventory_hostname }} |
          | Report type | clone validation |
          | Result | passed |

          ## Identity

          | Field | Value |
          | --- | --- |
          | Hostname | {{ ansible_hostname }} |
          | FQDN | {{ ansible_fqdn }} |
          | IPv4 address | {{ ansible_default_ipv4.address }} |

          ## Checks

          | Check | Result | Evidence |
          | --- | --- | --- |
          | Machine ID regenerated | passed | `/etc/machine-id` is valid |
          | Cloud-init status | passed | `{{ cloud_init_status.stdout }}` |
          | FQDN IPv4 resolution | passed | resolves to `{{ ansible_default_ipv4.address }}` |

          ## DNS resolution

          ```text
          {{ fqdn_resolution.stdout | default('') }}
          ```
      delegate_to: localhost
