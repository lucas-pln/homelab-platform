---
ansible-navigator:
  ansible:
    config:
      path: ./ansible.cfg
    inventory:
      entries:
      - ./inventory/proxmox.proxmox.yml
  execution-environment:
    container-engine: podman
    environment-variables:
      pass:
      - ANSIBLE_PROXMOX_URL
      - ANSIBLE_PROXMOX_USER
      - ANSIBLE_PROXMOX_TOKEN_ID
      - ANSIBLE_PROXMOX_TOKEN_SECRET
    image: localhost/homelab-ansible-ee:1.0.0
    pull:
      policy: never
  mode: stdout
  playbook-artifact:
    enable: true
    save-as: "artifacts/{playbook_name}-artifact-{time_stamp}.json"
  logging:
    level: warning
    file: "ansible-navigator.log"
